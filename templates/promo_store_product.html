{% extends 'base.html' %}

{% block title %}Уцінка товару - ZLAGODA{% endblock %}

{% block content %}
<div class="dashboard-container" style="max-width: 600px; margin-top: 40px;">
    <h2>🏷️ Переведення товару в акційний статус</h2>
    <p style="font-size: 16px; margin-bottom: 25px;">Товар: <span style="color: var(--primary-pink); font-weight: bold;">{{ prod[4] }}</span></p>
    
    {% if error %}
    <div style="background-color: #ffcccc; color: #cc0000; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Поточний звичайний залишок</label>
                <input type="text" class="form-control" value="{{ prod[3] }} шт/кг" disabled style="background: #f9f9f9; border-color: #eee;">
            </div>

            <div class="form-group">
                <label>Поточна роздрібна ціна</label>
                <input type="text" class="form-control" value="{{ prod[2] }} грн" disabled style="background: #f9f9f9; border-color: #eee;">
            </div>
        </div>

        <div class="form-group">
            <label>Новий акційний штрих-код (UPC) *</label>
            <input type="text" name="promo_upc" class="form-control" required maxlength="12" 
                   value="{{ prod[5] if prod[5] else '' }}" placeholder="Введіть 12 знаків акційного штрих-коду">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Кількість для акції *</label>
                <input type="number" name="promo_qty" class="form-control" required min="1" max="{{ prod[3] }}" placeholder="Введіть кількість">
            </div>
            
            <div class="form-group">
                <label>Акційна ціна (Авторозрахунок 80%)</label>
                <input type="text" class="form-control" value="{{ promo_price }} грн" disabled style="background: #e8f8f5; border-color: var(--primary-green); color: #16a085; font-weight: bold;">
            </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; background-color: #e67e22; border-color: #e67e22; margin-top: 15px;">Провести уцінку товару</button>
    </form>
</div>
{% endblock %}
