{% extends 'base.html' %}

{% block title %}Редагування клієнта - ZLAGODA{% endblock %}

{% block content %}
<div class="dashboard-container" style="max-width: 700px; margin-top: 40px;">
    <h2>✎ Редагування картки клієнта</h2>
    <p style="font-size: 14px; color: gray; margin-bottom: 25px;">Номер картки: <b>{{ card_number }}</b></p>

    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Прізвище *</label>
                <input type="text" name="surname" class="form-control" required value="{{ customer[1] }}">
            </div>
            <div class="form-group">
                <label>Ім'я *</label>
                <input type="text" name="name" class="form-control" required value="{{ customer[2] }}">
            </div>
            <div class="form-group">
                <label>По батькові</label>
                <input type="text" name="patronymic" class="form-control" value="{{ customer[3] if customer[3] else '' }}">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Телефон *</label>
                <input type="text" name="phone" class="form-control" required value="{{ customer[4] }}">
            </div>
            <div class="form-group">
                <label>Знижка (%) *</label>
                <input type="number" name="percent" class="form-control" required min="0" max="100" value="{{ customer[8] }}">
            </div>
        </div>

        <h3 style="font-size: 16px; margin-top: 20px; color: var(--primary-green);">Адресні дані</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Місто</label>
                <input type="text" name="city" class="form-control" value="{{ customer[5] if customer[5] else '' }}">
            </div>
            <div class="form-group">
                <label>Вулиця</label>
                <input type="text" name="street" class="form-control" value="{{ customer[6] if customer[6] else '' }}">
            </div>
            <div class="form-group">
                <label>Поштовий індекс</label>
                <input type="text" name="zip_code" class="form-control" value="{{ customer[7] if customer[7] else '' }}">
            </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px; padding: 15px;">Зберегти зміни</button>
        <a href="/manager/customers" style="display: block; text-align: center; margin-top: 15px; color: #e74c3c; text-decoration: none; font-weight: 500;">Скасувати</a>
    </form>
</div>
{% endblock %}
