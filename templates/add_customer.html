{% extends 'base.html' %}
{% block content %}
<div class="login-container" style="max-width: 600px; margin-top: 5vh; padding: 40px;">
    <h2>Реєстрація клієнта</h2>
    <form method="POST">
        <div class="form-group"><label>Номер картки</label><input type="text" name="card_number" class="form-control" required></div>
        <div class="form-group"><label>Прізвище</label><input type="text" name="surname" class="form-control" required></div>
        <div class="form-group"><label>Ім'я</label><input type="text" name="name" class="form-control" required></div>
        <div class="form-group"><label>По батькові</label><input type="text" name="patronymic" class="form-control"></div>
        <div class="form-group"><label>Телефон</label><input type="text" name="phone" class="form-control" required></div>
        <div class="form-group"><label>Місто</label><input type="text" name="city" class="form-control" required></div>
        <div class="form-group"><label>Вулиця</label><input type="text" name="street" class="form-control" required></div>
        <div class="form-group"><label>Індекс</label><input type="text" name="zip_code" class="form-control" required></div>
        <div class="form-group"><label>Відсоток знижки</label><input type="number" name="percent" class="form-control" required></div>
        <button type="submit" class="btn-primary">Зареєструвати</button>
    </form>
</div>
{% endblock %}
