{% extends 'base.html' %}

{% block title %}Редагування працівника{% endblock %}

{% block content %}
<div class="login-container" style="max-width: 800px; margin-top: 5vh; padding: 40px;">
    <h2>Редагування працівника</h2>
    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Прізвище</label><input type="text" name="surname" class="form-control" value="{{ employee[1] }}" required></div>
            <div class="form-group"><label>Ім'я</label><input type="text" name="name" class="form-control" value="{{ employee[2] }}" required></div>
            <div class="form-group"><label>По батькові</label><input type="text" name="patronymic" class="form-control" value="{{ employee[3] }}"></div>
            <div class="form-group"><label>Посада</label>
                <select name="role" class="form-control">
                    <option value="Cashier" {% if employee[4] == 'Cashier' %}selected{% endif %}>Cashier</option>
                    <option value="Manager" {% if employee[4] == 'Manager' %}selected{% endif %}>Manager</option>
                </select>
            </div>
            <div class="form-group"><label>Зарплата</label><input type="number" step="0.01" name="salary" class="form-control" value="{{ employee[5] }}" required></div>
            <div class="form-group"><label>Дата народження</label><input type="date" name="birth_date" class="form-control" value="{{ employee[6] }}" required></div>
            <div class="form-group"><label>Дата початку роботи</label><input type="date" name="start_date" class="form-control" value="{{ employee[7] }}" required></div>
            <div class="form-group"><label>Телефон</label><input type="text" name="phone" class="form-control" value="{{ employee[8] }}" required></div>
            <div class="form-group"><label>Місто</label><input type="text" name="city" class="form-control" value="{{ employee[9] }}" required></div>
            <div class="form-group"><label>Вулиця</label><input type="text" name="street" class="form-control" value="{{ employee[10] }}" required></div>
            <div class="form-group"><label>Індекс</label><input type="text" name="zip_code" class="form-control" value="{{ employee[11] }}" required></div>
            <div class="form-group"><label>Логін</label><input type="text" name="login" class="form-control" value="{{ employee[12] }}" required></div>
        </div>
        <button type="submit" class="btn-primary" style="margin-top: 20px;">Зберегти зміни</button>
        <button type="button" class="btn-primary" style="background-color: transparent; border: 1px solid #ccc; color: #333;" onclick="window.location.href='/manager/employees'">Скасувати</button>
    </form>
</div>
{% endblock %}
