{% extends 'base.html' %}
{% block content %}
<div class="dashboard-container" style="max-width: 500px;">
    <h2>Редагування товару: {{ upc }}</h2>
    <form method="POST">
        <div class="form-group">
            <label>Ціна продажу</label>
            <input type="number" step="0.01" name="selling_price" class="form-control" value="{{ product[0] }}" required>
        </div>
        <div class="form-group">
            <label>Кількість на складі</label>
            <input type="number" name="products_number" class="form-control" value="{{ product[1] }}" required>
        </div>
        <button type="submit" class="btn-primary">Зберегти зміни</button>
    </form>
</div>
{% endblock %}
